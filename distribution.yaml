name: oh-hermes
version: 0.1.0
description: "Arch-first Hermes Agent power profile: brain, search, workspace, secretary, worker, swarm, and guarded self-improvement."
hermes_requires: ">=0.15.0"
author: "oh-hermes"
license: "MIT"
env_requires:
  - name: OH_HERMES_MODEL_API_KEY
    description: "API key for the selected OpenAI-compatible inference endpoint"
    required: true
  - name: OH_HERMES_MODEL_BASE_URL
    description: "OpenAI-compatible inference base URL, e.g. https://openrouter.ai/api/v1"
    required: true
  - name: OH_HERMES_MODEL
    description: "Default model id returned by /v1/models or entered manually"
    required: true
  - name: ANYSEARCH_API_KEY
    description: "Optional AnySearch key for higher rate limits"
    required: false
  - name: ZEROENTROPY_API_KEY
    description: "Optional GBrain embedding/reranker key"
    required: false
  - name: OPENAI_API_KEY
    description: "Optional fallback for GBrain embeddings and OpenAI-compatible tools"
    required: false
distribution_owned:
  - SOUL.md
  - config.yaml
  - mcp.json
  - skills/
  - templates/
  - cron/
  - distribution.yaml
